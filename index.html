<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEXCARE - نظام الجودة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
  // تطبيق الثيم مبكراً لتجنب الوميض
  (function(){
    var t = localStorage.getItem('apex-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  /* ══════════════════════════════════════════
     THEME VARIABLES
  ══════════════════════════════════════════ */
  :root {
    --apex-gold: #d4a843;
    --apex-gold-light: #f0c96a;
    --apex-teal: #0ea5b0;
    --apex-teal-light: #22d3ee;
    --apex-red: #ef4444;
    --apex-green: #10b981;
    --apex-purple: #8b5cf6;
    --apex-radius: 12px;
  }

  /* الوضع الداكن (افتراضي) */
  :root, [data-theme="dark"] {
    --bg:          #0a0e1a;
    --bg-nav:      rgba(10,14,26,0.97);
    --bg-card:     #161d2e;
    --bg-input:    #111827;
    --bg-input-hover: #1a2234;
    --border:      #1e2d4a;
    --text:        #e2e8f0;
    --text-muted:  #64748b;
    --text-label:  #94a3b8;
    --select-opt:  #111827;
    --shadow:      0 4px 24px rgba(0,0,0,0.4);
    
    --apex-dark:   #0a0e1a;
    --apex-navy:   #111827;
    --apex-card:   #161d2e;
    --apex-border: #1e2d4a;
    --apex-text:   #e2e8f0;
    --apex-muted:  #64748b;
    --apex-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  /* الوضع الفاتح */
  [data-theme="light"] {
    --bg:          #f1f5f9;
    --bg-nav:      rgba(255,255,255,0.97);
    --bg-card:     #ffffff;
    --bg-input:    #f8fafc;
    --bg-input-hover: #f1f5f9;
    --border:      #e2e8f0;
    --text:        #111827;
    --text-muted:  #6b7280;
    --text-label:  #374151;
    --select-opt:  #ffffff;
    --shadow:      0 2px 12px rgba(0,0,0,0.08);
    
    --apex-dark:   #f1f5f9;
    --apex-navy:   #ffffff;
    --apex-card:   #ffffff;
    --apex-border: #e2e8f0;
    --apex-text:   #111827;
    --apex-muted:  #6b7280;
    --apex-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* زر التبديل */
  .theme-toggle {
    width: 40px; height: 22px;
    background: var(--border);
    border-radius: 11px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    top: 3px; right: 3px;
    transition: transform 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  [data-theme="light"] .theme-toggle { background: #0ea5b0; }
  [data-theme="light"] .theme-toggle::after { transform: translateX(-18px); }
  .theme-toggle-wrap {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); font-family: Cairo;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    transition: background 0.3s, color 0.3s;
  }

  /* ---- TOP NAV ---- */
  .nav {
    background: var(--bg-nav);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--apex-gold), var(--apex-teal));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    color: #0a0e1a;
  }

  .nav-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    background: linear-gradient(90deg, var(--apex-gold), var(--apex-teal-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
  }

  .nav-tab { color: var(--text-muted);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    background: transparent;
    
  }

  .nav-tab.active { color: var(--text);
    background: var(--bg-card);
    color: var(--apex-gold);
    border: 1px solid var(--border);
  }

  .nav-tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255,255,255,0.05);
  }

  /* ---- MANAGER AUTH ---- */
  /* ---- LANDING SCREEN ---- */
  #landing-screen { transition: background 0.3s; }
  #landing-screen input[type="password"] {
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 12px 14px;
    width: 100%;
    font-family: Cairo;
    font-size: 15px;
    direction: rtl;
    transition: border-color 0.2s;
  }
  #landing-screen input[type="password"]:focus {
    outline: none;
    border-color: var(--apex-teal);
    box-shadow: 0 0 0 3px rgba(14,165,176,0.15);
  }

  .auth-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    text-align: center;
  }

  .auth-box h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--apex-gold);
  }

  .auth-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

  /* ---- MAIN LAYOUT ---- */
  .main {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ---- CARDS ---- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--apex-radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title { color: var(--text);
    font-size: 16px;
    font-weight: 700;
    color: var(--apex-gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--apex-gold);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ---- FORM ELEMENTS ---- */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
  }

  select, input[type="text"], input[type="password"], input[type="email"], textarea {
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    width: 100%;
    transition: border-color 0.2s, background 0.2s;
    direction: rtl;
    appearance: auto;
  }

  select { cursor: pointer; }

  select:hover, input:hover, textarea:hover {
    background: var(--bg-input-hover);
  }

  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--apex-teal);
    box-shadow: 0 0 0 3px rgba(14,165,176,0.15);
  }

  select option {
    background: var(--select-opt);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    padding: 8px;
  }

  /* ---- TRACK BADGE ---- */
  .track-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .track-calls { background: rgba(14,165,176,0.15); color: var(--apex-teal-light); border: 1px solid rgba(14,165,176,0.3); }
  .track-messages { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
  .track-dual { background: rgba(212,168,67,0.15); color: var(--apex-gold-light); border: 1px solid rgba(212,168,67,0.3); }

  /* ---- SCORE RING ---- */
  .score-ring-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .score-ring {
    width: 100px;
    height: 100px;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
  }

  .score-ring-label { font-size: 10px; color: var(--text-muted); }

  /* ---- EMPLOYEE GRID ---- */
  .employees-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .employee-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .employee-card:hover {
    border-color: var(--apex-teal);
    transform: translateY(-2px);
  }

  .employee-card-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .employee-card-bonus {
    font-size: 13px;
    color: var(--apex-green);
    font-weight: 600;
    margin-top: 8px;
  }

  /* ---- PROGRESS BAR ---- */
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* ---- BUTTONS ---- */
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--apex-gold), #b8860b);
    color: #0a0e1a;
  }

  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--apex-red);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .btn-teal {
    background: rgba(14,165,176,0.15);
    color: var(--apex-teal-light);
    border: 1px solid rgba(14,165,176,0.3);
  }

  .btn-teal:hover { background: rgba(14,165,176,0.25); }

  .btn-full { width: 100%; justify-content: center; }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ---- UPLOAD ZONE ---- */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--apex-teal);
    background: rgba(14,165,176,0.05);
  }

  .upload-zone-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone-text { font-size: 13px; color: var(--text-muted); }

  .upload-preview {
    width: 100%;
    max-height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 12px;
  }

  /* ---- ALERT / TOAST ---- */
  .toast-container {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 320px;
    pointer-events: none;
  }

  .toast {
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    animation: toastIn 0.3s ease;
    pointer-events: all;
    display: flex;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(10px);
  }

  .toast-success { background: rgba(16,185,129,0.9); color: white; }
  .toast-error { background: rgba(239,68,68,0.9); color: white; }
  .toast-warning { background: rgba(245,158,11,0.9); color: white; }
  .toast-info { background: rgba(14,165,176,0.9); color: white; }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- ESCALATION ALERT ---- */
  .escalation-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }

  .escalation-box {
    background: var(--bg-card);
    border: 2px solid var(--apex-red);
    border-radius: 16px;
    padding: 40px;
    max-width: 400px;
    text-align: center;
    animation: shake 0.5s;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }

  .escalation-icon { font-size: 48px; margin-bottom: 16px; }
  .escalation-title { font-size: 22px; font-weight: 900; color: var(--apex-red); margin-bottom: 8px; }
  .escalation-msg { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

  /* ---- CRITERIA SELECTOR ---- */
  .criteria-group {
    margin-bottom: 12px;
  }

  .criteria-group-title {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 700;
    padding: 4px 8px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 4px;
  }

  /* ---- SUPERVISOR SCORE DISPLAY ---- */
  .sup-score-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .sup-score-num {
    font-size: 32px;
    font-weight: 900;
    color: var(--apex-gold);
    min-width: 80px;
  }

  .sup-score-label { font-size: 12px; color: var(--text-muted); }
  .sup-score-info { font-size: 13px; color: var(--text); }

  /* ---- DEDUCTION BUTTONS ---- */
  .deduct-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .deduct-btn {
    padding: 10px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    text-align: center;
    transition: all 0.2s;
  }

  .deduct-btn:hover {
    background: rgba(239,68,68,0.15);
    border-color: var(--apex-red);
    color: var(--apex-red);
  }

  /* ---- WEEKLY REPORT ---- */
  .report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .report-table th {
    background: var(--border);
    padding: 10px 14px;
    text-align: right;
    font-weight: 700;
    font-size: 13px;
  }

  .report-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .report-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* ---- LOG TABLE ---- */
  .log-table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 700px;
  }

  .log-table th {
    background: var(--border);
    padding: 8px 12px;
    text-align: right;
    font-size: 12px;
    color: var(--text-muted);
  }

  .log-table td { color: var(--text);
    padding: 8px 12px;
    border-bottom: 1px solid rgba(30,45,74,0.5);
  }

  /* ---- SECTION HEADER ---- */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-header h2 {
    font-size: 20px;
    font-weight: 700;
  }

  /* ---- LOADING ---- */
  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--apex-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- DIVIDER ---- */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ---- STAT CHIPS ---- */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-chip { background: var(--bg-card); border: 1px solid var(--border);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .stat-chip-value { font-size: 24px; font-weight: 900; }
  .stat-chip-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ---- IMAGE MODAL ---- */
  .img-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .img-modal img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 8px;
  }

  /* صفحة المشرفة — خلفية فاتحة دائماً */
  #page-supervisor { background: var(--bg); margin: -24px; padding: 24px; min-height: 100vh; }

  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }
    .employees-grid { grid-template-columns: 1fr 1fr; }
    .deduct-grid { grid-template-columns: repeat(3,1fr); }
    .nav-title { font-size: 14px; }
    .stat-row { grid-template-columns: 1fr 1fr; }
  }

  /* ── Theme-aware utility classes ── */
  .t-card-title { font-size:15px; font-weight:700; color:var(--text); font-family:Cairo; }
  .t-card-title-sm { font-size:14px; font-weight:700; color:var(--text); font-family:Cairo; }
  .t-text { color:var(--text); font-family:Cairo; }
  .t-text-muted { color:var(--text-muted); }
  .t-input {
    background:var(--bg-input) !important;
    border:1.5px solid var(--border) !important;
    color:var(--text) !important;
    border-radius:8px;
    padding:10px 14px;
    font-family:Cairo;
    font-size:14px;
    width:100%;
  }
  .t-input option { background:var(--select-opt); color:var(--text); }
  .t-modal-box {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:16px;
  }
  .t-inner-box {
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
  }
  .t-cancel-btn {
    flex:1; padding:11px; border-radius:8px; font-family:Cairo; font-size:14px;
    font-weight:700; cursor:pointer;
    border:1px solid var(--border);
    background:var(--bg-card);
    color:var(--text);
  }
  .t-section-header {
    font-size:15px; font-weight:700; color:var(--text);
    font-family:Cairo; margin-bottom:16px;
    display:flex; align-items:center; gap:8px;
  }

</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- ESCALATION OVERLAY -->
<div class="escalation-overlay" id="escalationOverlay">
  <div class="escalation-box">
    <div class="escalation-icon">⚠️</div>
    <div class="escalation-title" id="escalationTitle">إنذار شفهي</div>
    <div class="escalation-msg" id="escalationMsg">تكرر نفس المخالفة للمرة الرابعة</div>
    <button class="btn btn-danger btn-full" onclick="closeEscalation()">تم الاطلاع</button>
  </div>
</div>

<!-- MANAGER AUTH OVERLAY -->
